spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/tmp_dev
    username: tmp
    password: tmp
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: tmp-dev-pool
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.tmp: DEBUG
