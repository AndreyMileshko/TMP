spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/tmp_dev
    username: tmp
    password: tmp
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: tmp-dev-pool
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration

tmp:
  security:
    bootstrap:
      admin-login: ${TMP_SECURITY_BOOTSTRAP_ADMIN_LOGIN:admin}
      admin-display-name: ${TMP_SECURITY_BOOTSTRAP_ADMIN_DISPLAY_NAME:Administrator}
      admin-password: ${TMP_SECURITY_BOOTSTRAP_ADMIN_PASSWORD:dev-admin-password}

logging:
  level:
    com.tmp: DEBUG
