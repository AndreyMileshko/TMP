spring:
  config:
    activate:
      on-profile: package
  datasource:
    url: ${TMP_DB_URL}
    username: ${TMP_DB_USERNAME}
    password: ${TMP_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: tmp-package-pool
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.tmp: INFO
