spring:
  main:
    web-application-type: none
    banner-mode: off
  profiles:
    active: ${TMP_PROFILE:dev}

tmp:
  platform:
    name: TOP Manufacturing Platform
    version: 0.1.0-SNAPSHOT

logging:
  level:
    root: INFO
    com.tmp: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
